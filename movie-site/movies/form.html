<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>후기작성</title>
    </head>
    <body>
        <header>
            <h1>영화 후기 작성</h1>
        </header>
        <main>
            <form action="#" method="post">           
                <p>
                    <label for="movie-select">영화 선택:</label>
                    <select id="movie-select" name="movie">
                        <option value="endgame">어벤져스: 엔드게임</option>
                        <option value="doomsday">어벤져스: 둠스데이</option>
                    </select>
                </p>
                <p>
                    <label for="user-name">닉네임:</label>
                    <input type="text" id="user-name" name="username" placeholder="닉네임을 입력하세요">
                </p>
                <p>
                    <label for="rating">평점 (1~5):</label>
                    <input type="number" id="rating" name="rating" min="1" max="5" value="5">
                </p>
                <p>
                    <label for="view-date">관람일:</label>
                    <input type="date" id="view-date" name="viewdate">
                </p>
                <p>
                    <label for="review-text">상세 후기:</label><br>
                    <textarea id="review-text" name="review" rows="10" cols="50" placeholder="영화에 대한 솔직한 후기를 남겨주세요."></textarea>
                </p>
                <p>
                    <button type="submit">후기 등록하기</button>
                </p>
            </form>
            <hr>
            <a href="../index.html">← 메인 페이지로 돌아가기</a>
        </main>
    </body>
</html>
